<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#020617;
color:white;
padding:15px;
}

.title{
font-size:26px;
text-align:center;
color:gold;
margin-bottom:15px;
text-shadow:0 0 10px gold;
}

.item{
display:flex;
gap:10px;
background:#111;
padding:12px;
border-radius:15px;
margin-bottom:10px;
align-items:center;
}

.item img{
width:70px;
height:70px;
border-radius:12px;
object-fit:cover;
}

.info{flex:1;}
.price{color:gold;}

.qty{
display:flex;
gap:8px;
margin-top:5px;
}

.qty button{
padding:4px 10px;
border:none;
background:gold;
border-radius:6px;
cursor:pointer;
}

.remove{
background:red;
color:white;
padding:6px 10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.total{
margin-top:20px;
font-size:22px;
color:gold;
text-align:center;
}

.actions{
margin-top:20px;
text-align:center;
}

.actions button{
padding:12px 20px;
border:none;
border-radius:12px;
background:gold;
cursor:pointer;
font-size:15px;
font-weight:600;
margin:5px;
}
</style>

</head>

<body>

<div class="title">🛒 Your Cart</div>

<div id="cartItems"></div>

<div class="total" id="total"></div>

<div class="actions">
<button id="backBtn">⬅ Back to Menu</button>
<button id="orderBtn">🛍 Order Now</button>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){
let container = document.getElementById("cartItems");
container.innerHTML = "";

let total = 0;

cart.forEach((item,index)=>{

if(!item.qty) item.qty = 1;

total += item.price * item.qty;

container.innerHTML += `
<div class="item">
<img src="${item.img}">
<div class="info">
<h3>${item.name}</h3>
<div class="price">₹ ${item.price}</div>

<div class="qty">
<button onclick="changeQty(${index}, -1)">-</button>
<span>${item.qty}</span>
<button onclick="changeQty(${index}, 1)">+</button>
</div>
</div>

<button class="remove" onclick="removeItem(${index})">X</button>
</div>
`;
});

document.getElementById("total").innerText = "Total: ₹ " + total;

localStorage.setItem("cart", JSON.stringify(cart));
}

function changeQty(index, change){
cart[index].qty += change;
if(cart[index].qty <= 0) cart.splice(index,1);
renderCart();
}

function removeItem(index){
cart.splice(index,1);
renderCart();
}

// ✅ FIXED BUTTON EVENTS (IMPORTANT)
document.getElementById("backBtn").onclick = function(){
window.location.href = "MenuT.html";
};

document.getElementById("orderBtn").onclick = function(){
window.location.href = "order.html";
};

renderCart();

</script>

</body>
</html>
