<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury View</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-EELB4NPHX4"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-EELB4NPHX4');
</script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* GLOW BG */
body::before{
content:"";
position:fixed;
width:300px;
height:300px;
background:gold;
filter:blur(150px);
top:-100px;
left:-100px;
opacity:0.2;
}

/* TOP */
.top{
padding:20px;
text-align:center;
animation:fadeUp 1s ease;
}

.product-img{
width:100%;
height:220px;
object-fit:contain;
background:#111;
border-radius:20px;
box-shadow:0 0 40px rgba(255,215,0,0.2);
transition:0.4s;
}

.product-img:hover{
transform:scale(1.05);
}

.ingredients{
margin-top:10px;
font-size:14px;
color:#aaa;
}

/* MIDDLE */
.middle{
margin-top:auto;
text-align:center;
padding:15px;
animation:fadeUp 1.2s ease;
}

.price{
font-size:28px;
color:gold;
font-weight:700;
margin-bottom:10px;
text-shadow:0 0 10px gold;
}

/* BUTTON */
.btn{
width:90%;
padding:14px;
margin-top:12px;
border:none;
border-radius:14px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.cart{
background:linear-gradient(45deg,#22c55e,#4ade80);
color:white;
box-shadow:0 0 15px #22c55e;
}

.ar{
background:white;
color:black;
}

.btn:hover{
transform:scale(1.07);
}

/* AD */
.ad{
height:80px;
border-top:1px dashed rgba(255,255,255,0.3);
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
color:#888;
}

/* OVERLAY */
.overlay{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:998;
}

/* SUCCESS POPUP (PHONEPE STYLE) */
.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%, -50%) scale(0.7);
background:#022c22;
padding:30px;
border-radius:25px;
width:85%;
max-width:300px;
text-align:center;
box-shadow:0 0 50px rgba(34,197,94,0.6);
z-index:1000;
opacity:0;
transition:0.4s;
}

.popup.show{
opacity:1;
transform:translate(-50%, -50%) scale(1);
}

/* SUCCESS ICON */
.success-icon{
font-size:50px;
color:#4ade80;
animation:pop 0.5s ease;
}

@keyframes pop{
0%{transform:scale(0);}
100%{transform:scale(1);}
}

/* LOADER */
.loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:2000;
}

.loader span{
width:15px;
height:15px;
margin:5px;
background:gold;
border-radius:50%;
animation:bounce 0.6s infinite alternate;
}

.loader span:nth-child(2){animation-delay:0.2s;}
.loader span:nth-child(3){animation-delay:0.4s;}

@keyframes bounce{
to{transform:translateY(-15px);}
}

/* ANIMATION */
@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}
</style>

</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
<span></span><span></span><span></span>
</div>

<div class="top">
<img id="productImg" class="product-img">
<div class="ingredients" id="productIngredients"></div>
</div>

<div class="middle">

<div class="price" id="productPrice"></div>

<button class="btn cart" onclick="addToCart()">🛒 Add to Cart</button>
<button class="btn ar" onclick="openAR()">👁️ View In AR</button>

</div>

<div class="ad">
Premium Experience Mode
</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay"></div>

<!-- POPUP -->
<div id="popup" class="popup">

<div class="success-icon">✔</div>

<div style="font-size:20px;color:#4ade80;font-weight:600;margin-top:10px;">
Added Successfully
</div>

<button id="orderBtn" onclick="goCart()" style="
margin-top:15px;
width:100%;
padding:12px;
background:gold;
border:none;
border-radius:10px;
font-size:15px;">
🛒 Order Now
</button>

</div>

<!-- SOUND -->
<audio id="clickSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=click-124467.mp3"></audio>

<script>
const params = new URLSearchParams(window.location.search);

// DATA
let name = params.get("name");
let price = params.get("price");
let img = params.get("img");

// LOAD
document.getElementById("productImg").src = img;
document.getElementById("productIngredients").innerText = params.get("ingredients");
document.getElementById("productPrice").innerText = "₹ " + price;

// LOADER OFF
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},1000);

// SOUND
function playSound(){
document.getElementById("clickSound").play();
}

// ADD TO CART
function addToCart(){

playSound();

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let existing = cart.find(item => item.name === name);

if(existing){
existing.qty += 1;
}else{
cart.push({
name:name,
price:Number(price),
img:img,
qty:1
});
}

localStorage.setItem("cart", JSON.stringify(cart));

let popup = document.getElementById("popup");
let overlay = document.getElementById("overlay");

overlay.style.display="block";
popup.style.display="block";

setTimeout(()=>popup.classList.add("show"),50);
}

// GO CART
function goCart(){
window.location.href="cart.html";
}

// 🔥 AR BUTTON (DYNAMIC)
function openAR(){
playSound();
window.location.href="ar.html?name=" + encodeURIComponent(name);
}
</script>

</body>
</html>
